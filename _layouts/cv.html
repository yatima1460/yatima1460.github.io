<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.title }}">
  <link rel="stylesheet" href="{{ '/simple.css' | relative_url }}">
</head>
<body>
  <div class="window">
    <div class="title-bar">
      <div class="title-bar-text">Curriculum Vitae</div>
    </div>
    <div class="window-body">

      <h1>{{ page.title | default: site.title }}</h1>

      <hr>

      <div class="social-buttons screen-only">
        <a class="btn" href="https://github.com/yatima1460" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a class="btn" href="https://linkedin.com/in/yatima1460" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a class="btn" href="https://discord.com/users/yatima" target="_blank" rel="noopener noreferrer">Discord</a>
      </div>

      <div class="print-only print-links">
        <p><strong>Links</strong></p>
        <ul>
          <li>GitHub: https://github.com/yatima1460</li>
          <li>LinkedIn: https://linkedin.com/in/yatima1460</li>
          <li>Discord: https://discord.com/users/yatima</li>
        </ul>
      </div>

      <hr>

      {{ content }}

      <hr>
      
      <footer>
        <p class="center">&copy; 2026 Yatima Santamorena</p>
      </footer>
    </div>
  </div>
</body>
</html>
